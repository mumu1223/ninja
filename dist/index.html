<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" sizes="32x32" href="/asserts/favicon-32x32.png?v=3">
    <link rel="icon" type="image/png" sizes="16x16" href="/asserts/favicon-16x16.png?v=3">
    <link rel="shortcut icon" href="/favicon.png?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=3">
    <meta name="theme-color" content="#ffffff">
    <title>ibmx</title>
    <style>
      :root {
        color-scheme: light;
        --text-primary: #fffaf3;
        --text-secondary: rgba(255, 250, 243, 0.86);
        --panel-bg: rgba(126, 178, 220, 0.18);
        --panel-border: rgba(255, 255, 255, 0.32);
        --panel-shadow: rgba(79, 138, 186, 0.28);
        --text-shadow: rgba(77, 131, 176, 0.45);
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
        font-family: "Avenir Next", "Helvetica Neue", "PingFang SC", sans-serif;
        background:
          linear-gradient(rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.08)),
          url("asserts/ballon-background.png") center / cover no-repeat;
      }

      .hero {
        min-width: min(72vw, 420px);
        padding: 28px 32px;
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        background: var(--panel-bg);
        box-shadow: 0 18px 50px var(--panel-shadow);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        text-align: center;
      }

      .date-diff {
        color: var(--text-primary);
        font-size: clamp(72px, 16vw, 144px);
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0.04em;
        text-shadow: 0 10px 28px var(--text-shadow);
      }

      @media (max-width: 768px) {
        body {
          padding: 16px;
          background-position: center center;
        }

        .hero {
          min-width: auto;
          width: min(100%, 320px);
          padding: 24px 20px;
          border-radius: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main class="hero" aria-label="Day counter">
      <div class="date-diff" id="date-diff"></div>
    </main>
    <script>
      const currentDate = new Date();
      const startTime = Date.UTC(2012, 5, 30);
      const currentTime = Date.UTC(
        currentDate.getFullYear(),
        currentDate.getMonth(),
        currentDate.getDate()
      );
      const msPerDay = 24 * 60 * 60 * 1000;
      const dayDiff = Math.floor((currentTime - startTime) / msPerDay);

      document.getElementById("date-diff").textContent = dayDiff;
    </script>
  </body>
</html>
